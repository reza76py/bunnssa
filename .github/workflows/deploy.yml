name: Deploy Bunnings SSA

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SERVER_SSH_KEY }}

      - name: Add server host key
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy on production server
        env:
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          EMAIL_HOST_USER: ${{ secrets.EMAIL_HOST_USER }}
          EMAIL_APP_PASSWORD: ${{ secrets.EMAIL_APP_PASSWORD }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
        run: |
          ssh -o StrictHostKeyChecking=no ${SERVER_USER}@${SERVER_HOST} bash << EOF
            {
              echo "DJANGO_SETTINGS_MODULE=backend.settings.production"
              echo "DEBUG=False"
              echo "SECRET_KEY=${SECRET_KEY}"
              echo "DB_ENGINE=django.db.backends.mysql"
              echo "DB_NAME=bunnings_ssa"
              echo "DB_USER=root"
              echo "DB_PASSWORD=${DB_PASSWORD}"
              echo "DB_HOST=db"
              echo "DB_PORT=3306"
              echo "ALLOWED_HOSTS=staffallocation.rezteche.com,65.108.243.73"
              echo "CORS_ALLOWED_ORIGINS=https://staffallocation.rezteche.com"
              echo "CSRF_TRUSTED_ORIGINS=https://staffallocation.rezteche.com"
              echo "EMAIL_BACKEND=django.core.mail.backends.smtp.EmailBackend"
              echo "EMAIL_HOST=mail.privateemail.com"
              echo "EMAIL_PORT=587"
              echo "EMAIL_USE_TLS=True"
              echo "EMAIL_HOST_USER=${EMAIL_HOST_USER}"
              echo "EMAIL_APP_PASSWORD=${EMAIL_APP_PASSWORD}"
              echo "DEFAULT_FROM_EMAIL=Staff Allocation <info@rezteche.com>"
              echo "FRONTEND_URL=https://staffallocation.rezteche.com"
              echo "SECURE_SSL_REDIRECT=False"
              echo "SESSION_COOKIE_SECURE=True"
              echo "CSRF_COOKIE_SECURE=True"
              echo "REACT_APP_API_URL=/api"
            } > /var/www/bunnings-ssa/.env
            chmod 600 /var/www/bunnings-ssa/.env
            cd /var/www/bunnings-ssa
            git fetch origin main
            git reset --hard origin/main
            chmod +x deploy.sh
            bash deploy.sh
          EOF
