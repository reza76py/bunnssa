name: Deploy Bunnings SSA

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SERVER_SSH_KEY }}

      - name: Add server host key
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy on production server
        env:
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          EMAIL_HOST_USER: ${{ secrets.EMAIL_HOST_USER }}
          EMAIL_APP_PASSWORD: ${{ secrets.EMAIL_APP_PASSWORD }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
        run: |
          ssh -o StrictHostKeyChecking=no ${SERVER_USER}@${SERVER_HOST} bash << EOF
            cat > /var/www/bunnings-ssa/.env << ENVEOF
DJANGO_SETTINGS_MODULE=backend.settings.production
DEBUG=False
SECRET_KEY=${SECRET_KEY}
DB_ENGINE=django.db.backends.mysql
DB_NAME=bunnings_ssa
DB_USER=root
DB_PASSWORD=${DB_PASSWORD}
DB_HOST=db
DB_PORT=3306
ALLOWED_HOSTS=staffallocation.rezteche.com,65.108.243.73
CORS_ALLOWED_ORIGINS=https://staffallocation.rezteche.com
CSRF_TRUSTED_ORIGINS=https://staffallocation.rezteche.com
EMAIL_BACKEND=django.core.mail.backends.smtp.EmailBackend
EMAIL_HOST=mail.privateemail.com
EMAIL_PORT=587
EMAIL_USE_TLS=True
EMAIL_HOST_USER=${EMAIL_HOST_USER}
EMAIL_APP_PASSWORD=${EMAIL_APP_PASSWORD}
DEFAULT_FROM_EMAIL=Staff Allocation <info@rezteche.com>
FRONTEND_URL=https://staffallocation.rezteche.com
SECURE_SSL_REDIRECT=False
SESSION_COOKIE_SECURE=True
CSRF_COOKIE_SECURE=True
REACT_APP_API_URL=https://staffallocation.rezteche.com/api
ENVEOF
            chmod 600 /var/www/bunnings-ssa/.env
            cd /var/www/bunnings-ssa
            git fetch origin main
            git reset --hard origin/main
            chmod +x deploy.sh
            bash deploy.sh
          EOF
