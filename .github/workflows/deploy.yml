name: Deploy Bunnings SSA

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build production images (CI verification)
        env:
          REACT_APP_API_URL: https://staffallocation.rezteche.com/api
          DB_NAME: ci_db
          DB_USER: ci_user
          DB_PASSWORD: ci_password
        run: |
          docker compose -f docker-compose.prod.yml build --pull

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SERVER_SSH_KEY }}

      - name: Add server host key
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy on production server
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          EMAIL_HOST_USER: ${{ secrets.EMAIL_HOST_USER }}
          EMAIL_APP_PASSWORD: ${{ secrets.EMAIL_APP_PASSWORD }}
        run: |
          ssh ${SERVER_USER}@${SERVER_HOST} << EOF
          set -euo pipefail

          APP_DIR="/var/www/bunnings-ssa"
          if [ ! -d "\$APP_DIR/.git" ]; then
            git clone https://github.com/${{ github.repository }}.git "\$APP_DIR"
          fi

          cd "\$APP_DIR"

          cat > .env << ENVVARS
# --- Django runtime ---
DJANGO_SETTINGS_MODULE=backend.settings.production
SECRET_KEY=${SECRET_KEY}
DEBUG=False
ALLOWED_HOSTS=staffallocation.rezteche.com,www.staffallocation.rezteche.com
CSRF_TRUSTED_ORIGINS=https://staffallocation.rezteche.com,https://www.staffallocation.rezteche.com
CORS_ALLOWED_ORIGINS=https://staffallocation.rezteche.com,https://www.staffallocation.rezteche.com

# --- Database ---
DB_ENGINE=django.db.backends.mysql
DB_NAME=bunnings_ssa
DB_USER=bunnings_user
DB_PASSWORD=${DB_PASSWORD}
DB_HOST=db
DB_PORT=3306

# --- Email ---
EMAIL_BACKEND=django.core.mail.backends.smtp.EmailBackend
EMAIL_HOST=smtp.gmail.com
EMAIL_PORT=587
EMAIL_USE_TLS=True
EMAIL_HOST_USER=${EMAIL_HOST_USER}
EMAIL_APP_PASSWORD=${EMAIL_APP_PASSWORD}

# --- Security ---
SECURE_SSL_REDIRECT=True
SESSION_COOKIE_SECURE=True
CSRF_COOKIE_SECURE=True
SECURE_HSTS_SECONDS=31536000
SECURE_HSTS_INCLUDE_SUBDOMAINS=True
SECURE_HSTS_PRELOAD=True

# --- Static / Media ---
STATIC_ROOT=/app/staticfiles
MEDIA_ROOT=/app/media

# --- Frontend build ---
REACT_APP_API_URL=https://staffallocation.rezteche.com/api
ENVVARS

          chmod 600 .env
          bash deploy.sh
          EOF
