{% extends "admin/index.html" %} {% block content %} {% if dashboard_stats %}
<div
  style="
    margin: 0 0 24px 0;
    padding: 18px;
    background: #fff;
    border: 1px solid #ddd;
    border-radius: 8px;
  "
>
  <h2 style="margin: 0 0 14px 0; font-size: 18px">Dashboard Stats</h2>
  <div
    style="
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px;
    "
  >
    {% for label, value in dashboard_stats.items %}
    <div
      style="
        padding: 14px;
        border: 1px solid #e5e5e5;
        border-radius: 8px;
        background: #fafafa;
      "
    >
      <div style="font-size: 12px; color: #666; margin-bottom: 6px">
        {{ label }}
      </div>
      <div style="font-size: 24px; font-weight: 700; color: #111">
        {{ value }}
      </div>
    </div>
    {% endfor %}
  </div>
</div>
{% endif %} {{ block.super }} {% endblock %}
